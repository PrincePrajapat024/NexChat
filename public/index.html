<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="logo">
        💬
    </div>

    <h1>NexChat</h1>

    <p class="tagline">
        Connect. Chat. Collaborate.
    </p>

    <form class="join-form">

        <input
            type="text"
            placeholder="Enter your name"
            id="username"
            autocomplete="off"
        >

        <button type="submit">
            🚀 Join Conversation
        </button>

    </form>

    <p class="footer">
        Made with ❤️ using Socket.IO
    </p>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
